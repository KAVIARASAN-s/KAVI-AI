<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KAVI AI</title>

<link rel="stylesheet" href="/static/css/style.css">

</head>

<body>

<div class="app">

    <div class="sidebar">

        <h2>⚡ KAVI AI</h2>

        <button onclick="newChat()">
            + New Chat
        </button>

    </div>

    <div class="main">

        <div class="header">

            Offline AI Assistant

        </div>

        <div id="chat-box"></div>

        <div class="input-area">

            <input
            id="message"
            placeholder="Ask anything..."
            >

            <button id="sendBtn"
            onclick="sendMessage()">

            ➤

            </button>

        </div>

    </div>

</div>

<script src="/static/js/script.js"></script>

</body>

</html>
